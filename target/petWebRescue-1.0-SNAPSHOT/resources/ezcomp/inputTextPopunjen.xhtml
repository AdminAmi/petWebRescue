<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="jakarta.faces.composite"
      xmlns:jsf="jakarta.faces"          
      xmlns:ui="jakarta.faces.facelets">
    <cc:interface>
        <cc:attribute name="cssDIV"/> <!-- css string za DIV tag-->
        <cc:attribute name="ID"/> <!-- id od input taga-->
        <cc:attribute name="TIP"/> <!-- tip - type od input taga-->
        <cc:attribute name="CSS"/> <!-- css za input tag-->
        <cc:attribute name="PHOLDER"/><!-- placeholder string za input tag-->
        <cc:attribute name="VALUE"/><!-- vrijednost iz beana za input-->
        <cc:attribute name="REQ"/> <!--vrijednosat atributa required input taga-->
        <cc:attribute name="REQWHO"/> <!--Objašnjenje koje polje mora biti popunjeno-->
        <cc:attribute name="DISABLED"/><!-- vrijednost atributa disabled input taga-->
        <cc:attribute name="prikaziMarginu" type="java.lang.Boolean" default="true" />
        <cc:attribute name="VISIBLE" type="java.lang.Boolean" default="true" />
        <cc:attribute name="VALIDATE" type="java.lang.Boolean" default="false" />
    </cc:interface>
     <!-- IMPLEMENTATION -->
    <cc:implementation >
        <ui:param name="puniId" value="#{cc.clientId}:#{cc.attrs.ID}" />
        <!-- Provjera da li je polje bilo prisutno u HTTP zahtjevu (čak i ako je prazno) -->
        <ui:param name="poljeJePoslano" 
            value="#{facesContext.externalContext.requestParameterMap.containsKey(puniId)}" />
        <ui:param name="imaGresku" 
            value="#{not empty facesContext.getMessageList(puniId)}" />        
        <!-- Provjeravamo i poslanu vrijednost i trenutnu vrijednost u bean-u -->
        <ui:param name="imaVrijednost" 
            value="#{not empty cc.attrs.VALUE or not empty param[puniId]}" />
        <!-- LOGIKA: Ako je postback, a nema greške i polje nije prazno -> postani zeleno -->
        <ui:param name="statusKlasa" 
            value="#{facesContext.postback and poljeJePoslano ? (imaGresku ? 'is-invalid' : (not empty cc.attrs.VALUE ? 'is-valid' : '')) : ''}" />
        
        <div class="form-floating #{cc.attrs.prikaziMarginu ? 'mb-3' : ''} #{cc.attrs.cssDIV}">
            <input jsf:id="#{cc.attrs.ID}" 
                   jsf:immediate="#{cc.attrs.VALIDATE}"                   
                   type="#{cc.attrs.TIP}"
                   style="#{cc.attrs.VISIBLE ? '' : 'display:none;'}"                   
                   class="form-control #{statusKlasa} #{cc.attrs.CSS}" 
                   placeholder="#{cc.attrs.PHOLDER}"
                   jsf:value="#{cc.attrs.VALUE}" 
                   jsf:required="#{cc.attrs.REQ}" 
                   jsf:requiredMessage="#{cc.attrs.REQWHO}"
                   disabled="#{cc.attrs.DISABLED}">
                <!--<f:validateBean disabled="#{!cc.attrs.VALIDATE}" />-->
            </input>
            <label for="#{puniId}" style="#{cc.attrs.VISIBLE ? '' : 'display:none;'}">
                #{cc.attrs.PHOLDER}
            </label>
            <div class="invalid-feedback">#{cc.attrs.REQWHO}</div>
            <div class="valid-feedback">Izgleda dobro!</div>
        </div>
    </cc:implementation>

</html>
