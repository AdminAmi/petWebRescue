name: Generate and Deploy Javadoc

on:
  push:
    branches:
      - master # Promijenite u main ako vam se glavna grana zove main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Postavi Java okruženje
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Generisi Javadoc
        run: |
          # Pokrećemo compile fazu koja automatski okida plugin definisan u POM-u
          mvn clean compile

      - name: Postavi GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Otpremi Javadoc arhivu
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/site/apidocs'

      - name: Objavi na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
