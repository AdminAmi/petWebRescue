name: Generate and Deploy Javadoc

on:
  push:
    branches:
      - master # Promijenite u main ako vam se glavna grana tako zove

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Postavi Java okruženje
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Generisi Javadoc
        run: |
          run: |
          echo "=== 1. PROVJERA STRUKTURE FOLDERA ==="
          ls -R src/
          
          echo "=== 2. POKRETANJE KOMPAJLIRANJA ==="
          mvn clean compile
          
          echo "=== 3. GENERISANJE JADOC-A ==="
          mvn javadoc:javadoc -DfailOnError=true -Dmaven.javadoc.failOnError=true

      - name: Postavi GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Otpremi Javadoc arhivu
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/site/apidocs'

      - name: Objavi na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
