<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:jsf="jakarta.faces"
      xmlns:c="jakarta.tags.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="jakarta.faces.passthrough"
      xmlns:ezcomp="jakarta.faces.composite/ezcomp"
>

            <ui:include src="resources/parts/zaglavlje.xhtml" />

                 <ezcomp:podnaslov Podnaslov="Molimo Vas da unesete podatke za novog administratora "/>

                    <ezcomp:korisnik ButtonAction="#{korisnikPogled.unosNovogAdministratoraWeb()}"

                                     user="#{korisnikPogled.korisnickoIme}" pass="#{korisnikPogled.korisnickaLozinka}"
                                     id="korisnik1" tekstButt="Unesi novog korisnika!"/>
