<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:ezcomp="jakarta.faces.composite/ezcomp"
      xmlns:p="jakarta.faces.passthrough"
      xmlns:c="jakarta.tags.core"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Facelet Title</title>
        <h:outputStylesheet name="bootstrap.min.css" />
        <h:outputStylesheet name="mycss.css" />
        <h:outputScript name="bootstrap.bundle.min.js" />
        <f:view>
         <f:metadata>
            <f:viewParam name="IDLjubimca" value="#{ljubimacPogled.selektovaniID}"/>            
            <f:viewAction action="#{ljubimacPogled.ucitajLjubimca()}"/> 
         </f:metadata>
        </f:view>
    </h:head>
    <h:body>
        <ui:include src="resources/parts/nav.xhtml"/>
        <ui:include src="resources/parts/errorMessage.xhtml"/>       
        <div class="container"> 
            <ui:include src="resources/parts/zaglavlje.xhtml"/>                
            <ezcomp:podnaslov Podnaslov="Podaci o ljubimcu:"/>
            <div style="padding-left: 30px;padding-top: 10px;">
               
                <div class="row g-2">
                    <div class="col-sm-3 ">
                        <h:form id="f1" enctype="multipart/form-data">
                        <c:if test="#{ljubimacPogled.ljubimacK.ljubimac.path == 'null'}">
                            <div style="text-align: center">
                               
                                <h:graphicImage value="/resources/pic/avatar.jpg" width="205px" style="padding-bottom: 20px;padding-top: 10px;" class="rounded"/>
                                <h:inputFile value="#{ljubimacPogled.datoteka}" class="form-control"  p:required="true"   rendered="#{korisnikPogled.kont.korisnik.tip == 'ADMINISTRATOR'}"/>
                                <div style="padding-bottom: 15px;padding-top: 15px;" >
                                <h:commandButton class="btn btn-block btn-outline-dark" value="Snimi sliku"  rendered="#{korisnikPogled.kont.korisnik.tip == 'ADMINISTRATOR'}" 
                                                 action="#{ljubimacPogled.snimiSliku(ljubimacPogled.ljubimacK.ljubimac.id)}"/>
                                </div>
                               
                            </div>
                        </c:if>
                         <c:if test="#{ljubimacPogled.ljubimacK.ljubimac.path != 'null'}">
                             <div style="text-align: center">
                             <h:graphicImage value="#{ljubimacPogled.ljubimacK.ljubimac.path}" width="205px" class="rounded" style="padding-bottom: 30px;"/>
                             <h:inputFile value="#{ljubimacPogled.datoteka}" class="form-control"  p:required="true" rendered="#{korisnikPogled.kont.korisnik.tip == 'ADMINISTRATOR'}" />
                                <div  style="padding-bottom: 15px;padding-top: 20px;">
                                    <h:commandButton class="btn btn-block btn-outline-dark" value="Ažuriraj sliku"  rendered="#{korisnikPogled.kont.korisnik.tip == 'ADMINISTRATOR'}"
                                                 action="#{ljubimacPogled.snimiSliku(ljubimacPogled.ljubimacK.ljubimac.id)}"/>
                                </div>
                             </div>
                        </c:if> 
                        </h:form>
                    </div>                        
                    <div class="col-sm-9 ">
                        <h:form id="f2">
                        <ezcomp:ljubimac 
                            naziv="#{ljubimacPogled.ljubimacK.ljubimac.ime}"                                         
                            starost="#{ljubimacPogled.ljubimacK.ljubimac.starost}"                             
                            vrsta="#{ljubimacPogled.ljubimacK.ljubimac.vrsta}"                                         
                            datum="#{ljubimacPogled.ljubimacK.ljubimac.datum_udomljavanja}"                                         
                            rend="#{korisnikPogled.kont.korisnik.tip == 'ADMINISTRATOR'}"                                         
                            rendRezervisi="#{korisnikPogled.kont.korisnik.tip == 'KORISNIK'}"                                         
                            ButtonAction="#{ljubimacPogled.azurirajLjubimca(ljubimacPogled.ljubimacK.ljubimac)}"
                            ButtonActionRezervisi="#{ljubimacPogled.rezervisiLjubimca(korisnikPogled.kont.korisnik.id)}"
                            tekstButt="Ažuriraj podatke ljubimca!"
                        />
                        <br/>
                       
                        
                        </h:form>
                        
                    </div>                    
                </div>                    
                
            </div>
        </div>
        
        
        
    </h:body>
</html>
