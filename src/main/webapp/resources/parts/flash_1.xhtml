<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
    <h:head>
    <title>Flash Poruke u JSF-u</title>
    <h:outputStylesheet name="bootstrap.min.css" />
        <h:outputStylesheet name="mycss.css" />
        <h:outputScript name="bootstrap.bundle.min.js" />
    <style>
        /* Flash Message Styles */
        .flash-message {position: relative; padding: 20px 60px 20px 25px;margin: 20px 0;border-radius: 10px;box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);animation: slideIn 0.5s ease-out;display: flex;align-items: center;border-left: 5px solid;}
        .flash-success {background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);color: white;border-left-color: #1B5E20;}
        .flash-error {background: linear-gradient(135deg, #f44336 0%, #c62828 100%);color: white;border-left-color: #b71c1c;}
        .flash-icon { margin-right: 15px; font-size: 24px; }
        .flash-content { flex-grow: 1; padding-right: 15px; }
        .flash-title { font-weight: 800; font-size: 20px; margin-bottom: 5px; }
        .flash-text { font-size: 16px; line-height: 1.5; opacity: 0.95; }
        .flash-close {position: absolute;top: 15px;right: 15px;background: rgba(255, 255, 255, 0.2);border: none;width: 32px;height: 32px;border-radius: 50%;/* color: white;*/color:black;font-size: 18px;font-weight: bold;cursor: pointer;}
        .flash-close:hover {background: rgba(255, 255, 255, 0.3);transform: scale(1.1);}
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }
        .flash-message.hiding { animation: fadeOut 0.5s ease-in forwards;}
    </style>
    
    <script>
        function closeFlashMessage(elementId) {
            var element = document.getElementById(elementId);
            element.classList.add('hiding');
            setTimeout(function() {
                element.style.display = 'none';
            }, 500);
        }
    </script>
</h:head>
    <h:body>
         <!-- Success Message -->
    <div class="flash-message alert-success" id="successFlash" 
         style="#{empty flash.successMessage ? 'display: none;' : ''}">
        <div class="flash-icon">✅</div>
        <div class="flash-content">
            <div class="flash-title">Uspjeh!</div>
            <div class="flash-text"><strong>#{flash.successMessage}</strong></div>
        </div>
        <button class="flash-close" onclick="closeFlashMessage('successFlash')">×</button>
    </div>

    <!-- Error Message -->
    <div class="flash-message alert-danger" id="errorFlash" 
         style="#{empty flash.errorMessage ? 'display: none;' : ''}">
        <div class="flash-icon">❌</div>
        <div class="flash-content">
            <div class="flash-title">Greška!</div>
            <div class="flash-text">#{flash.errorMessage}</div>
        </div>
        <button class="flash-close" onclick="closeFlashMessage('errorFlash')">×</button>
    </div>

    </h:body>
</html>
