<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
    
    <h:head>
        <title>PetRescue - Notifikacije</title>
    </h:head>

    <h:body>
        
        <!-- 
            GLAVNI KONTEJNER ZA TOASTOVE 
            Pozicioniran fiksno u gornjem desnom uglu.
        -->
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
            
            <!-- Iteracija kroz sve JSF poruke iz FacesContext-a -->
            <ui:repeat value="#{facesContext.messageList}" var="msg">
                
                <div class="toast show align-items-center text-white border-0 
                            #{msg.severity.ordinal == 0 ? 'bg-success-light' : 
                              (msg.severity.ordinal == 2 ? 'bg-danger-light' : 'bg-warning-light')}" 
                     role="alert" 
                     aria-live="assertive" 
                     aria-atomic="true">
                    
                    <!-- Zaglavlje toasta: Boja se mijenja zavisno od ozbiljnosti poruke (Info, Error, Warning) -->
                    <div class="toast-header #{msg.severity.ordinal == 0 ? 'bg-success' : 
                                              (msg.severity.ordinal == 2 ? 'bg-danger' : 'bg-warning')}">
                        
                        <strong class="text-white">PetRescue poruka</strong>
                        
                        <button type="button" 
                                class="btn-close btn-close-white me-2 m-auto" 
                                style="opacity: 1;" 
                                data-bs-dismiss="toast" 
                                aria-label="Close"></button>
                    </div>
                   
                    <!-- Tijelo toasta: Prikazuje glavni sadržaj poruke -->
                    <div class="toast-body" style="opacity: 0.85;">
                        <strong>#{msg.summary}</strong>
                        
                        <ui:remove>
                            <!-- Detaljan opis poruke je trenutno isključen -->
                            <br/>#{msg.detail}
                        </ui:remove>
                    </div>
                </div>
                
            </ui:repeat>
        </div> 

        <!-- 
            JAVASCRIPT LOGIKA 
            Upravlja inicijalizacijom i automatskim prikazom Bootstrap toast elemenata.
        -->
        <script>
            /**
             * Pronalazi sve toast elemente koji imaju sadržaj i aktivira ih.
             */
            function prikaziTostove() {
                const toastElList = [].slice.call(document.querySelectorAll('.toast'));
                
                toastElList.map(function (toastEl) {
                    const toastBody = toastEl.querySelector('.toast-body');
                    const poruka = toastBody ? toastBody.innerText.trim() : "";

                    // Inicijalizuj i prikaži toast samo ako sadrži tekstualnu poruku
                    if (poruka !== "") {
                        const t = new bootstrap.Toast(toastEl, { 
                            autohide: true, 
                            delay: 5000 
                        });
                        t.show();
                        return t;
                    }
                });
            }

            // Pokretanje skripte nakon što se cijela stranica učita
            document.addEventListener("DOMContentLoaded", prikaziTostove);

            /**
             * JSF AJAX podrška:
             * Ponovo pokreće prikaz toastova nakon svakog uspješnog AJAX zahtjeva.
             */
            if (typeof jsf !== 'undefined') {
                jsf.ajax.addOnEvent(function(data) {
                    if (data.status === 'success') {
                        prikaziTostove();
                    }
                });
            }
        </script>
        
    </h:body>
</html>
