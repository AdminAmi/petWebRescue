<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="jakarta.faces.composite"
      xmlns:h="jakarta.faces.html"
      xmlns:jsf="jakarta.faces"      
      xmlns:f="jakarta.faces.core"
      xmlns:c="jakarta.tags.core"
      xmlns:ui="jakarta.faces.facelets">

    <!-- INTERFACE -->
    <cc:interface>
        <cc:attribute name="Zapisi" required="true" type="java.util.ArrayList"/>
        <cc:attribute name="Poruka" required="true" />
    </cc:interface>

    <!-- IMPLEMENTATION -->
    <cc:implementation>
        <div class="table-responsive" >
            <h:panelGroup rendered="#{not empty cc.attrs.Zapisi}"> 
                <h:dataTable value="#{cc.attrs.Zapisi}" var="ljubi" 
                class="small table table-bordered table-sm align-middle table-striped" >
                <ui:remove>
                <h:column>
                    <f:facet name="header">Slika ljubimca</f:facet> 
                    #{ljubi.ljub.path}
                    <div style="text-align: center">
                        <c:if test="#{ljubi.ljub.path == 'null'}">
                            <h:graphicImage value="/resources/pic/avatar.jpg" height="75px" />
                        </c:if>
                        <c:if test="#{ljubi.ljub.path != 'null'}">
                            <h:graphicImage value="#{ljubi.ljub.path}" class="rounded" height="75px" />
                        </c:if>
                    </div>
                </h:column>
                </ui:remove>
            <h:column>
                <f:facet name="header">Naziv ljubimca</f:facet> 
                <a data-toggle="tooltip" data-placement="left"  title="Manipulacija sa ljubimcem" jsf:outcome="ljubimacInfo" > 
                #{ljubi.ljub.ime} 
                <f:param name="IDLjubimca" value="#{ljubi.idLjubimac}"/> 
                <f:param name="IDKlijenta" value="#{ljubi.idKlijenti}"/> 
                </a>
            </h:column>
            <h:column>
                <f:facet name="header">Vrsta ljubimca</f:facet> #{ljubi.ljub.vrsta}
            </h:column>
            <h:column>
                <f:facet name="header">Starost</f:facet> #{ljubi.ljub.starost}. 
            </h:column>
            <h:column>
                <f:facet name="header">Korisnik</f:facet> #{ljubi.klijent.imeIPrezime} 
            </h:column>
                
            <h:column>
                <f:facet name="header">Datum aktivnosti</f:facet> 
                <h:outputText value="#{ljubi.datumUdomljavanja}"/>
                    
               
                   
            </h:column>
                     <h:column>
                <f:facet name="header">Aktivnost</f:facet> #{ljubi.status} 
            </h:column>
                    
                <h:column rendered="#{sessionKorisnikPogled.k.tip=='ADMINISTRATOR'}">
                <f:facet name="header">Akcije</f:facet>
                <h:form>
                    <h:commandButton 
                        action="#{ljubimacPogled.ukloniRezervaciju(ljubi.klijent.id,ljubi.ljub.id)}"
                        value="Ukloni rezervaciju" 
                        rendered="#{ljubi.ljub.status=='REZERVISAN'}"/>                                     
                    
                </h:form>
            </h:column>
        </h:dataTable>
            </h:panelGroup>        
            <h:panelGroup 
                rendered="#{empty cc.attrs.Zapisi }">            
                <div class="alert alert-info">#{cc.attrs.Poruka}</div>
            </h:panelGroup>
        </div>
    </cc:implementation>
</html>
