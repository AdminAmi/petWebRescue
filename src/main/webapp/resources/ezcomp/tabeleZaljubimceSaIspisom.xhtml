<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="jakarta.faces.composite"
      xmlns:ezcomp="jakarta.faces.composite/ezcomp"
      xmlns:h="jakarta.faces.html">

    <!-- INTERFACE -->
    <cc:interface>
        <cc:attribute name="ListaZaTabelu" required="true" type="java.util.ArrayList"/>
        <cc:attribute name="Poruka" required="true" />
    </cc:interface>
    <!-- IMPLEMENTATION -->
    <cc:implementation>
        <h:panelGroup rendered="#{not empty cc.attrs.ListaZaTabelu}">              
            <ezcomp:tabelaLjubimci Zapisi="#{cc.attrs.ListaZaTabelu}"
                                   Poruka=""/>
            
        </h:panelGroup>
        <h:panelGroup 
            rendered="#{empty cc.attrs.ListaZaTabelu}">            
            <div class="alert alert-info">#{cc.attrs.Poruka}</div>
        </h:panelGroup>
    </cc:implementation>
</html>
