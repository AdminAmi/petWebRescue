<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:c="jakarta.tags.core"
      xmlns:ezcomp="jakarta.faces.composite/ezcomp"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:jsf="jakarta.faces"
      lang="bs">
    
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>PetRescue - Administracija Ljubimaca</title>        
        <!-- Resursi: Bootstrap, Custom CSS i JS -->
        <h:outputStylesheet name="bootstrap.min.css" />
        <h:outputStylesheet name="mycss.css" />
        <h:outputScript name="bootstrap.bundle.min.js" />
        <h:outputScript library="js" name="myjs.js"/>
        
        <f:metadata>
            <!-- Inicijalno učitavanje liste ljubimaca za određenog korisnika -->
            <f:viewAction action="#{ljubimacPogled.ljubimci(sessionKorisnikPogled.k.id)}"/>           
        </f:metadata>        
    </h:head>

    <h:body>
        <!-- Sakrivanje standardnih JSF poruka jer se koriste custom toast notifikacije -->
        <h:messages style="display: none"/>           
        
        <!-- Provjera sesije prije iscrtavanja faze -->
        <f:view beforePhase="#{sessionKorisnikPogled.provjeraPrijave()}">  
            
            <!-- Uključivanje zajedničkih dijelova stranice (Navigacija, Poruke) -->
            <ui:include src="resources/parts/nav.xhtml"/>
            <ui:include src="resources/parts/flash.xhtml"/>
            <ui:include src="resources/parts/zaglavlje.xhtml"/>
            <ui:include src="resources/parts/errorMessage.xhtml"/>

            <div class="container">
                <!-- Prikaz sadržaja samo za korisnike sa rolom ADMINISTRATOR -->
                <c:if test="#{sessionKorisnikPogled.k.tip == 'ADMINISTRATOR'}">
                    
                    <div class="container" >
                        
                        <!-- Navigacioni Tabovi -->
                        <ul class="nav nav-tabs" id="petTabs" >
                            <ui:remove>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#dostupni">Dostupni ljubimci</a>
                            </li>
                            </ui:remove>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#rezervisani">&#128197; Rezervisani ljubimci</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#udomljeni">&#127968; Udomljeni ljubimci</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="tab" href="#pretraga">&#10133; Pretraga ljubimaca</a>
                            </li>
                        </ul>
                        

                        <br/>

                        <!-- Sadržaj Tabova (Tab Panes) -->
                        <div class="tab-content">
                            <ui:remove>
                            <!-- Tab: Dostupni ljubimci -->
                            <div class="tab-pane fade" id="dostupni">
                                <ezcomp:tabeleZaljubimceSaIspisom
                                    ListaZaTabelu="#{ljubimacPogled.ljub}"
                                    Poruka="Trenutno nema dostupnih ljubimaca"/>
                            </div>
                            </ui:remove>
                            <!-- Tab: Rezervisani ljubimci -->
                            <div class="tab-pane fade" id="rezervisani">                              
                                <ezcomp:tabelaLjubimciUdomljenje
                                    Zapisi="#{ljubimacPogled.rezervisani}" 
                                    Poruka="Nema rezervisanih ljubimaca!"/>
                            </div>

                            <!-- Tab: Udomljeni ljubimci -->
                            <div class="tab-pane fade" id="udomljeni">
                                <ezcomp:tabelaLjubimciUdomljenje
                                    Zapisi="#{ljubimacPogled.udomljeni}"
                                    Poruka="Trenutno nema udomljenih ljubimaca!"/>                             
                            </div>

                            <!-- Tab: Pretraga (Aktivni tab po defaultu) -->
                            <div class="tab-pane active" id="pretraga" >
                                <h:form id="formaPretraga"> 
                                    <div class="input-group mb-3"> 
                                        <!-- Custom input komponenta za unos imena -->
                                        <ezcomp:inputTextPopunjen
                                            VALIDATE="false"
                                            cssDIV="form-floating" 
                                            CSS="form-control" 
                                            ID="ime"                                                            
                                            prikaziMarginu="false"
                                            PHOLDER="Unesite ime ljubimca"
                                            VALUE="#{ljubimacPogled.prLjubimca}"/>
                                        
                                        <h:commandButton value="&#128269; Pretraga" 
                                                         class="btn btn-outline-secondary" 
                                                         action="#{ljubimacPogled.pretraga()}"/>
                                    </div>

                                    <!-- Prikaz rezultata pretrage pomoću tabele ako lista nije prazna -->
                                   
                                    <ezcomp:tabelaLjubimci Zapisi="#{ljubimacPogled.pretragaLista}"
                                       Poruka="Nema tražnih" pretrazivano="#{ljubimacPogled.pretrazivanje}"/>
                                    
                                </h:form>
                            </div> <!-- Kraj pretrage -->
                            
                        </div> <!-- Kraj tab-content -->
                    </div> <!-- Kraj unutrašnjeg kontejnera -->
                </c:if>
                <c:if test="#{sessionKorisnikPogled.k.tip=='KORISNIK'}">
                    Korisnik preusmjeravam........
                    <script>
                      let url = "ljubimci.xhtml";
                      window.location.href = url;
                    </script>
                </c:if>   
            </div> <!-- Kraj glavnog kontejnera -->
        </f:view>
    </h:body>
</html>
