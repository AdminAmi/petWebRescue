<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:jsf="jakarta.faces"
      xmlns:c="jakarta.tags.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="jakarta.faces.passthrough"
      xmlns:ezcomp="jakarta.faces.composite/ezcomp"
>
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Facelet Title</title>
        <h:outputStylesheet name="bootstrap.min.css" />
        <h:outputStylesheet name="mycss.css" />
        <h:outputScript name="bootstrap.bundle.min.js" />
    </h:head>
    <h:body>
        
        <c:if test="#{korisnikPogled.loged }" > 
            <ui:include src="resources/parts/errorMessage.xhtml"/>       
            <ui:include src="resources/parts/nav.xhtml"/>
        <div class="container" > 
            <ui:include src="resources/parts/zaglavlje.xhtml"/> 
            <ezcomp:podnaslov Podnaslov="Ažuriranje korisničkih podataka"/>            
            <!--<ui:include src="parts/logAz.xhtml"/> -->
            <h:form >                
                <ezcomp:korisnik 
                    ButtonAction="#{korisnikPogled.azuriranjeKorisnika()}" 
                    adresa="#{korisnikPogled.kont.korisnik.adresa}"
                    telefon="#{korisnikPogled.kont.korisnik.telefon}"
                    imeiprezime="#{korisnikPogled.kont.korisnik.imeIPrezime}" 
                    samoPass="false" jelUpdatePodataka="false" jelUpdatePassworda="true"
                    user="#{korisnikPogled.kont.korisnik.user}" pass="#{korisnikPogled.kont.korisnik.pass}"
                    id="korisnik1" tekstButt="Ažuriraj podatke korisnika!"
                    />    
            </h:form>           
        </div>
        </c:if>
        <ezcomp:greskaLog/>
    </h:body>
</html>
