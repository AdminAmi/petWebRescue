<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<!-- 
    Stranica za unos novog korisnika (New User Entry Page)
    Ova Facelet stranica omogućuje unos podataka za registraciju novog korisnika sustava.
    Koristi prilagođene komponente za unos korisničkih podataka.
-->
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="jakarta.faces.passthrough"
      xmlns:ezcomp="jakarta.faces.composite/ezcomp"
      xmlns:f="jakarta.faces.core">
    <!-- Odjeljak glave: Uključuje meta oznake, naslov, resurse i JavaScript -->
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Moj profil</title>
        <h:outputStylesheet name="bootstrap.min.css" />
        <h:outputStylesheet name="mycss.css" />
        <h:outputScript name="bootstrap.bundle.min.js" />
        <h:outputScript library="js" name="myjs.js"/>
        <f:metadata>
            <f:viewAction action="#{webKorisnikPogled.ucitajKorisnika()}"/>
        </f:metadata>
       
    </h:head>
    <!-- Tijelo stranice: Prikazuje obrazac za unos korisnika -->
    <h:body >
        <!-- Skriveni elementi za poruke -->
        <h:messages style="display: none"/>
        <!-- Uključi navigaciju -->
        <ui:include src="resources/parts/nav.xhtml"/>
        
        <!-- Provjera sesije prije iscrtavanja faze i da li je korisnik administrator -->
        <f:view beforePhase="#{sessionKorisnikPogled.provjeraPrijave()}"> 
            <div class="container" style="padding-top: 80px">
            
             
             <!-- Podnaslov za unos podataka -->
             <ezcomp:podnaslov Podnaslov="Podaci o korisniku: #{sessionKorisnikPogled.k.imeIPrezime},
              tip korisnika: #{sessionKorisnikPogled.k.tip}   "/>
             
             <!-- Obrazac za unos podataka -->
             <h:form styleClass="needs-validation" p:novalidate="novalidate" >
                <!-- Prilagođena komponenta za korisničke podatake -->
                <ezcomp:korisnik                      
                    imeiprezime="#{sessionKorisnikPogled.k.imeIPrezime}"
                    user="#{sessionKorisnikPogled.k.user}" 
                    pass="#{sessionKorisnikPogled.k.pass}"
                    adresa="#{sessionKorisnikPogled.k.adresa}"
                    telefon="#{sessionKorisnikPogled.k.telefon}"
                    id="korisnik1" 
                    samoPass="false" trebaLiPass="false"
                    jelPrikazKorisnika="false"
                    /> 
                 
                
             </h:form>
             <!-- Podnaslov za unos podataka -->
             <ezcomp:podnaslov Podnaslov="Rezervisani ljubimaci korisnika"/>
             <div style="padding-left: 30px;padding-top: 10px;">
             <ezcomp:tabelaLjubimciUdomljenje
                 Zapisi="#{webKorisnikPogled.trenutnaRezervacija}" 
                 Poruka="Nema rezervacija klijenta"/>
             </div>
             <ezcomp:podnaslov Podnaslov="Aktivnosti korisnika"/>
             <div style="padding-left: 30px;padding-top: 10px;">
             <ezcomp:tabelaLjubimciUdomljenje
                 Zapisi="#{webKorisnikPogled.udomljeni}" 
                 Poruka="Korisnik do sada nije imao aktivnosti na sistemu"/>
             </div>
         </div>
        </f:view>        
        <!-- Uključi poruke o greškama -->
        <ui:include src="resources/parts/errorMessage.xhtml"/>
    </h:body>
</html>
